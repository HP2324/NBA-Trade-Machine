version: '3.8'

services:
  # Backend service (Java / Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nba-trade-machine-backend
    ports:
      - "3000:3000"
    restart: unless-stopped

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nba-trade-machine-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:3000/api
    restart: unless-stopped
